<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find delicious recipes by browsing food categories or searching for your favorite meals. Detailed ingredients, instructions, and video guides.">
    <title>Meal Finder | Discover Delicious Recipes</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Sticky Navbar -->
    <header class="navbar" id="main-navbar">
        <div class="container">
            <a href="index.html" class="logo" id="nav-logo">Meal<span>Finder</span></a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" class="active" id="nav-home-link">Home</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="hero-banner">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 id="hero-heading">What are your favorite cuisines?</h1>
            <p id="hero-subheading">Browse hundreds of recipes across categories or search for specific dishes instantly.</p>
            <form class="search-form" id="search-form">
                <input type="text" id="search-input" placeholder="Search for meals (e.g., Arrabiata, Pie)..." autocomplete="off" required>
                <button type="submit" id="search-btn">Search</button>
            </form>
        </div>
    </section>

    <!-- Main Content Area -->
    <main class="container">
        <!-- Search Results Grid Section -->
        <section class="section" id="search-section" style="display: none;">
            <h2 class="section-title" id="search-results-title">Search Results</h2>
            <div class="grid" id="search-meals-grid">
                <!-- Dynamically populated meal cards -->
            </div>
        </section>

        <!-- Categories Section -->
        <section class="section" id="categories-section">
            <h2 class="section-title" id="categories-title">Browse Categories</h2>
            <div class="grid" id="categories-grid">
                <!-- Dynamically populated category cards -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer" id="main-footer">
        <div class="container">
            <p>&copy; 2026 Meal Finder. All rights reserved.</p>
            <p>Made by kamalesh</p>
            <ul class="footer-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </div>
    </footer>

    <!-- JavaScript Execution -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
