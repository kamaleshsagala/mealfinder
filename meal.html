<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View full recipe ingredients, detailed cooking instructions, and video guides.">
    <title>Recipe Details | Meal Finder</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Sticky Navbar -->
    <header class="navbar" id="main-navbar">
        <div class="container">
            <a href="index.html" class="logo" id="nav-logo">Meal<span>Finder</span></a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" id="nav-home-link">Home</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="container">
        <!-- Back Button -->
        <div class="back-btn-container">
            <a href="index.html" class="back-btn" id="meal-back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
                Back to Recipes
            </a>
        </div>

        <section class="meal-detail-section" id="meal-detail-section">
            <div id="meal-loading-placeholder">
                <!-- Spinner loads here -->
            </div>

            <div id="meal-detail-container" style="display: none;">
                <!-- Meal Title and Meta Details -->
                <div class="meal-header">
                    <h1 class="meal-header-title" id="meal-title">Meal Name</h1>
                    <div class="meal-meta" id="meal-meta-container">
                        <!-- Category, Area, and tags will render here -->
                    </div>
                </div>

                <!-- Detail Grid Layout -->
                <div class="meal-grid">
                    <!-- Left: Media & Action Buttons -->
                    <div class="meal-media">
                        <img class="meal-detail-img" id="meal-image" src="" alt="Meal Photo">
                        <div class="meal-actions" id="meal-actions-container">
                            <!-- Youtube and Source button links -->
                        </div>
                    </div>

                    <!-- Right: Ingredients Table & Instructions -->
                    <div class="meal-content">
                        <div class="ingredients-box">
                            <h2 class="meal-content-title">Ingredients</h2>
                            <div class="ingredients-list" id="meal-ingredients-list">
                                <!-- Dynamically populated rows of name + measure -->
                            </div>
                        </div>

                        <div class="instructions-box">
                            <h2 class="meal-content-title">Cooking Instructions</h2>
                            <p class="instructions-text" id="meal-instructions"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer" id="main-footer">
        <div class="container">
            <p>&copy; 2026 Meal Finder. All rights reserved.</p>
            <p>Powered by TheMealDB API. Made with pure HTML, CSS, and Vanilla JavaScript.</p>
            <ul class="footer-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </div>
    </footer>

    <!-- JavaScript Execution -->
    <script type="module" src="js/meal.js"></script>
</body>
</html>
